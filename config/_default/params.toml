mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since = 2026

[sidebar]
    emoji    = ""
    subtitle = "Cloud & DevOps Engineer"
    avatar   = "img/avatar.png"

[article]
    [article.license]
        enabled = true
        default = "Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page     = [{ type = "toc" }]

[comments]
    enabled  = false
    provider = ""

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
